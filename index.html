<script>
// ═══════════════════════════════
// JSONBIN CONFIG
// ═══════════════════════════════
const JSONBIN_MASTER_KEY = '$2a$10$H8/dbUWlIFxYwYbkKH/iwuYxlNFW1ycU9EmaWExCh7/XVeVCe1C3O';
const JSONBIN_BIN_ID     = '69fba166c0954111d8e82c4d';

// ═══════════════════════════════
// DATA MODEL
// ═══════════════════════════════
let data = {
  families: []
};

let currentFilter = 'all';
let saveTimer = null;

// ═══════════════════════════════
// STORAGE
// ═══════════════════════════════
function loadLocal() {
  try {
    const raw = localStorage.getItem('ktGuests2027');
    if (raw) data = JSON.parse(raw);
  } catch(e) {}
}

function saveLocal() {
  localStorage.setItem('ktGuests2027', JSON.stringify(data));
}

// ═══════════════════════════════
// JSONBIN SYNC (SUBSTITUI GIST)
// ═══════════════════════════════
async function syncCloud(showToast = false) {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_MASTER_KEY
      },
      body: JSON.stringify(data, null, 2)
    });

    if (!res.ok) throw new Error('Erro ' + res.status);

    if (showToast) toast('✓ Sincronizado na nuvem!');
  } catch (e) {
    if (showToast) toast('⚠ Erro ao salvar: ' + e.message);
  }
}

async function loadCloud() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: {
        'X-Master-Key': JSONBIN_MASTER_KEY
      }
    });

    if (!res.ok) throw new Error();

    const json = await res.json();
    if (json.record) {
      data = json.record;
      saveLocal();
    }
  } catch (e) {
    console.warn('Erro ao carregar nuvem');
  }
}

// ═══════════════════════════════
// AUTO SAVE
// ═══════════════════════════════
function scheduleSave() {
  saveLocal();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(syncCloud, 2000);
}

// ═══════════════════════════════
// FILTERS
// ═══════════════════════════════
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGuests();
}

function passesFilter(guest) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'confirmed') return guest.confirmed;
  if (currentFilter === 'unconfirmed') return !guest.confirmed;
  if (currentFilter === 'invited') return guest.invited;
  if (currentFilter === 'notinvited') return !guest.invited;
  if (currentFilter === 'padrinhos') return guest.role === 'padrinho' || guest.role === 'madrinha';
  if (currentFilter === 'pais') return guest.role === 'pai' || guest.role === 'mae';
  return true;
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s) {
  return (s||'')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
function capFirst(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

function findFamily(id) {
  return data.families.find(f => f.id === id);
}

function findGuest(fid,gid) {
  const f = findFamily(fid);
  return f ? f.guests.find(g => g.id === gid) : null;
}

// ═══════════════════════════════
// ACTIONS
// ═══════════════════════════════
function addFamily() {
  const name = prompt('Nome da família/grupo:');
  if (!name) return;

  data.families.push({
    id: uid(),
    name: name.trim(),
    guests: []
  });

  scheduleSave();
  renderGuests();
  renderStats();
}

function addGuestInline(fid){
  const f = findFamily(fid);
  const name = prompt("Nome do convidado:");
  if (!name || !f) return;

  f.guests.push({
    id: uid(),
    name,
    confirmed:false,
    invited:false,
    role:''
  });

  scheduleSave();
  renderGuests();
  renderStats();
}

function deleteGuest(fid,gid){
  const f = findFamily(fid);
  if (!f) return;

  f.guests = f.guests.filter(g => g.id !== gid);

  scheduleSave();
  renderGuests();
  renderStats();
}

function toggleConfirm(fid,gid,val){
  const g = findGuest(fid,gid);
  if (g){ g.confirmed = val; }

  scheduleSave();
  renderStats();
}

function toggleInvite(fid,gid,val){
  const g = findGuest(fid,gid);
  if (g){ g.invited = val; }

  scheduleSave();
  renderStats();
}

function setRole(fid,gid,role){
  const g = findGuest(fid,gid);
  if (g){ g.role = role; }

  scheduleSave();
  renderGuests();
  renderStats();
}

// ═══════════════════════════════
// RENDER (mantido base original)
// ═══════════════════════════════
function renderGuests() {
  const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
  const list = document.getElementById('guestList');
  let html = '';

  data.families.forEach(family => {

    const filtered = family.guests.filter(g => {
      const matchSearch = !search || g.name.toLowerCase().includes(search);
      return matchSearch && passesFilter(g);
    });

    const confirmed = family.guests.filter(g => g.confirmed).length;
    const invited = family.guests.filter(g => g.invited).length;

    html += `
    <div class="family-group">
      <div class="family-header">
        <strong>${esc(family.name)}</strong>
        <button onclick="addGuestInline('${family.id}')">+ Convidado</button>
      </div>
    `;

    filtered.forEach(g => {
      html += `
      <div class="guest-row">
        ${esc(g.name)}

        <input type="checkbox" ${g.confirmed?'checked':''}
          onchange="toggleConfirm('${family.id}','${g.id}',this.checked)">

        <input type="checkbox" ${g.invited?'checked':''}
          onchange="toggleInvite('${family.id}','${g.id}',this.checked)">

        <button onclick="deleteGuest('${family.id}','${g.id}')">X</button>
      </div>`;
    });

    html += `</div>`;
  });

  list.innerHTML = html;
}

// ═══════════════════════════════
// STATS
// ═══════════════════════════════
function renderStats() {
  let total=0, confirmed=0, invited=0;

  data.families.forEach(f=>{
    f.guests.forEach(g=>{
      total++;
      if(g.confirmed) confirmed++;
      if(g.invited) invited++;
    });
  });

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-confirmed').textContent = confirmed;
  document.getElementById('st-invited').textContent = invited;
  document.getElementById('st-families').textContent = data.families.length;
}

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
async function init(){
  loadLocal();
  await loadCloud();
  renderGuests();
  renderStats();
}

init();
</script>
